name: Build edt-toolbox

on:
  workflow_call:
    inputs:
      build_enabled:
        type: boolean
        default: true
    secrets:
      ONEC_USERNAME:
        required: true
      ONEC_PASSWORD:
        required: true
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || inputs.build_enabled
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/pre-build

      - name: Build image (oscript-downloader)
        id: build-oscript-downloader
        uses: ./.github/actions/build-image
        with:
          image_name: oscript-downloader
          image_version: latest
          image_desc: OneScript downloader
          containerfile: oscript/Containerfile
          build_args: |
            BASE_IMAGE=ubuntu
            BASE_TAG=24.04
            ONESCRIPT_VERSION=2.0.2
            ONESCRIPT_PACKAGES=yard
          is_default_branch: ${{ github.ref == 'refs/heads/main' }}

      - name: Build image (edt-toolbox)
        id: build-edt-toolbox
        uses: ./.github/actions/build-image
        with:
          image_name: edt-toolbox
          image_version: ${{ vars.EDT_VERSION || '2025.2.6' }}
          image_desc: 1C EDT development toolbox for distrobox/toolbx
          containerfile: edt-toolbox/Containerfile
          build_args: |
            ONEC_USERNAME=${{ secrets.ONEC_USERNAME }}
            ONEC_PASSWORD=${{ secrets.ONEC_PASSWORD }}
            EDT_VERSION=${{ vars.EDT_VERSION || '2025.2.6' }}
            OPENJDK_VERSION=${{ vars.OPENJDK_VERSION || '17' }}
            INSTALLER_BASE_IMAGE=eclipse-temurin
            INSTALLER_BASE_TAG=${{ vars.OPENJDK_VERSION || '17' }}-jdk-noble
            BASE_IMAGE=quay.io/toolbx/ubuntu-toolbox
            BASE_TAG=24.04
          is_default_branch: ${{ github.ref == 'refs/heads/main' }}
          publish: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) || 'false' }}
