name: Build edt-toolbox

run-name: ${{ github.ref_type == 'tag' && format('Build {0}', github.ref_name) || 'Build edt-toolbox' }}

on:
  push:
    tags:
      - 'packages/edt-toolbox/v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      edt_version:
        description: EDT version
        type: string
        default: '2025.2.6'
      platform_version:
        description: 1C:Enterprise platform version (for -client variant)
        type: string
        required: true
      nls_enabled:
        type: boolean
        default: false
      publish:
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: github.event_name != 'pull_request' || vars.BUILD_EDT_TOOLBOX != 'false'
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: ${{ github.ref_type == 'tag' && '0' || '1' }}

      - id: pre-build
        uses: ./.github/actions/pre-build
        with:
          component: edt-toolbox

      - name: Set versions from tag or defaults
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          VERSION_MAIN="${{ steps.pre-build.outputs.version_main }}"
          VERSION_DEPS='${{ steps.pre-build.outputs.version_deps }}'
          BUILD_NUM="${{ steps.pre-build.outputs.build_num }}"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            EDT_VER="$VERSION_MAIN"
            ONEC_VER=""
          else
            EDT_VER="${{ inputs.edt_version }}"
            ONEC_VER="${{ inputs.platform_version }}"
          fi

          for dep in ${VERSION_DEPS}; do
            if [[ "$dep" == client* ]]; then
              ONEC_VER="${dep#client}"
              break
            fi
          done

          if [[ -z "$EDT_VER" ]]; then
            echo "::error::EDT version (version_main) is required but was empty"
            exit 1
          fi
          if [[ -z "$ONEC_VER" ]]; then
            echo "::error::platform version (client dep) is required but was empty"
            exit 1
          fi

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            BASE_TAG="${EDT_VER}-base-r${BUILD_NUM}"
            CLIENT_IMAGE_TAG="${EDT_VER}-client${ONEC_VER}-r${BUILD_NUM}"
          else
            BASE_TAG="${EDT_VER}-base"
            CLIENT_IMAGE_TAG="${EDT_VER}-client${ONEC_VER}"
          fi

          echo "edt_version=${EDT_VER}" >> "$GITHUB_OUTPUT"
          echo "onec_version=${ONEC_VER}" >> "$GITHUB_OUTPUT"
          echo "base_tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "client_image_tag=${CLIENT_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=${{ github.event_name == 'workflow_dispatch' && inputs.publish || 'false' }}" >> "$GITHUB_OUTPUT"
          fi

      - id: build-installer
        uses: ./.github/actions/build-installer
        with:
          is_default_branch: ${{ steps.pre-build.outputs.is_default_branch == 'true' }}

      - name: Build image (edt-toolbox base)
        id: build-edt-toolbox-base
        uses: ./.github/actions/build-image
        with:
          image_name: edt-toolbox
          image_version: ${{ steps.versions.outputs.base_tag }}
          image_title: 1C EDT development toolbox for distrobox/toolbx (EDT only)
          containerfile: edt-toolbox/Containerfile
          build_args: |
            EDT_VERSION=${{ steps.versions.outputs.edt_version }}
            INSTALLER_IMAGE=${{ steps.build-installer.outputs.image-with-tag }}
            BASE_IMAGE=quay.io/toolbx/ubuntu-toolbox:26.04
          secrets: |
            onec_username=${{ secrets.ONEC_USERNAME }}
            onec_password=${{ secrets.ONEC_PASSWORD }}
          is_default_branch: ${{ steps.pre-build.outputs.is_default_branch == 'true' }}

      - name: Build image (edt-toolbox)
        id: build-edt-toolbox
        uses: ./.github/actions/build-image
        with:
          image_name: edt-toolbox
          image_version: ${{ steps.versions.outputs.client_image_tag }}
          image_title: 1C EDT + Client development toolbox for distrobox/toolbx
          image_desc: distrobox create --image <IMAGE> --name edt-toolbox && distrobox enter edt-toolbox
          containerfile: client-toolbox/Containerfile
          build_args: |
            ONEC_VERSION=${{ steps.versions.outputs.onec_version }}
            NLS_ENABLED=${{ inputs.nls_enabled || vars.NLS_ENABLED || false }}
            BASE_IMAGE=${{ steps.build-edt-toolbox-base.outputs.image-with-tag }}
            INSTALLER_IMAGE=${{ steps.build-installer.outputs.image-with-tag }}
          secrets: |
            onec_username=${{ secrets.ONEC_USERNAME }}
            onec_password=${{ secrets.ONEC_PASSWORD }}
          is_default_branch: ${{ steps.pre-build.outputs.is_default_branch == 'true' }}
          publish: ${{ steps.versions.outputs.publish }}
          registry_url: ${{ vars.CONTAINER_REGISTRY_URL }}
          registry_username: ${{ vars.CONTAINER_REGISTRY_USERNAME }}
          registry_password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
