name: Build Container Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish:
        description: Push images to GHCR and sign them
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  base-swarm-coverage-agent:
    uses: ./.github/workflows/build-base-swarm-coverage-agent.yml
    with:
      build_enabled: ${{ vars.BUILD_BASE_SWARM_COVERAGE_AGENT != 'false' }}
    secrets: inherit

  base-k8s-coverage-agent:
    uses: ./.github/workflows/build-base-k8s-coverage-agent.yml
    with:
      build_enabled: ${{ vars.BUILD_BASE_K8S_COVERAGE_AGENT != 'false' }}
    secrets: inherit

  oscript-swarm-agent:
    uses: ./.github/workflows/build-oscript-swarm-agent.yml
    with:
      build_enabled: ${{ vars.BUILD_OSCRIPT_SWARM_AGENT != 'false' }}

  oscript-k8s-agent:
    uses: ./.github/workflows/build-oscript-k8s-agent.yml
    with:
      build_enabled: ${{ vars.BUILD_OSCRIPT_K8S_AGENT != 'false' }}

  edt-swarm-agent:
    uses: ./.github/workflows/build-edt-swarm-agent.yml
    with:
      build_enabled: ${{ vars.BUILD_EDT_SWARM_AGENT != 'false' }}
    secrets: inherit

  edt-k8s-agent:
    uses: ./.github/workflows/build-edt-k8s-agent.yml
    with:
      build_enabled: ${{ vars.BUILD_EDT_K8S_AGENT != 'false' }}
    secrets: inherit

  server:
    uses: ./.github/workflows/build-server.yml
    with:
      build_enabled: ${{ vars.BUILD_SERVER != 'false' }}
    secrets: inherit

  executor:
    uses: ./.github/workflows/build-executor.yml
    with:
      build_enabled: ${{ vars.BUILD_EXECUTOR != 'false' }}
    secrets:
      DEV1C_EXECUTOR_API_KEY: ${{ secrets.DEV1C_EXECUTOR_API_KEY }}

  client-toolbox:
    uses: ./.github/workflows/build-client-toolbox.yml
    with:
      build_enabled: ${{ vars.BUILD_CLIENT_TOOLBOX != 'false' }}
    secrets: inherit

  edt-toolbox:
    uses: ./.github/workflows/build-edt-toolbox.yml
    with:
      build_enabled: ${{ vars.BUILD_EDT_TOOLBOX != 'false' }}
    secrets: inherit
