name: Build base-k8s-coverage-agent

run-name: Build base-k8s-coverage-agent

on:
  workflow_dispatch:
    inputs:
      platform_version:
        description: 1C:Enterprise platform version
        type: string
        default: '8.5.1.1343'
      publish:
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: github.event_name != 'pull_request' || vars.BUILD_BASE_K8S_COVERAGE_AGENT != 'false'
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - id: pre-build
        uses: ./.github/actions/pre-build
        with:
          component: coverage-agent-k8s

      - id: build-edt
        uses: ./.github/actions/build-edt
        with:
          EDT_VERSION: '2025.2.6'
          OPENJDK_VERSION: '17'
          ONEC_USERNAME: ${{ secrets.ONEC_USERNAME }}
          ONEC_PASSWORD: ${{ secrets.ONEC_PASSWORD }}
          is_default_branch: ${{ steps.pre-build.outputs.is_default_branch == 'true' }}

      - id: build-base-agent
        uses: ./.github/actions/build-base-k8s-agent
        with:
          ONEC_USERNAME: ${{ secrets.ONEC_USERNAME }}
          ONEC_PASSWORD: ${{ secrets.ONEC_PASSWORD }}
          ONEC_VERSION: ${{ steps.pre-build.outputs.version || inputs.platform_version }}
          ONESCRIPT_VERSION: '2.0.2'
          OPENJDK_VERSION: '17'
          is_default_branch: ${{ steps.pre-build.outputs.is_default_branch == 'true' }}
          publish: ${{ inputs.publish }}
          registry_url: ${{ vars.CONTAINER_REGISTRY_URL }}
          registry_username: ${{ vars.CONTAINER_REGISTRY_USERNAME }}
          registry_password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}

      - name: Build image (base-jenkins-coverage-agent)
        id: build-coverage-agent
        uses: ./.github/actions/build-image
        with:
          image_name: base-jenkins-coverage-agent
          image_version: ${{ steps.pre-build.outputs.image_tag || inputs.platform_version }}
          image_title: Base Jenkins k8s coverage agent
          containerfile: coverage41C/Containerfile
          build_args: |
            BASE_IMAGE=${{ steps.build-base-agent.outputs.image-with-tag }}
            EDT_IMAGE=${{ steps.build-edt.outputs.image-with-tag }}
            COVERAGE41C_VERSION=2.7.3
          is_default_branch: ${{ steps.pre-build.outputs.is_default_branch == 'true' }}
          publish: ${{ inputs.publish }}
          registry_url: ${{ vars.CONTAINER_REGISTRY_URL }}
          registry_username: ${{ vars.CONTAINER_REGISTRY_USERNAME }}
          registry_password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
