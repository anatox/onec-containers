name: Build client-toolbox

run-name: ${{ github.ref_type == 'tag' && format('Build {0}', github.ref_name) || 'Build client-toolbox' }}

on:
  push:
    tags:
      - 'packages/client-toolbox/v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform_version:
        description: 1C:Enterprise platform version
        type: string
        default: '8.5.1.1343'
      nls_enabled:
        type: boolean
        default: false
      publish:
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: github.event_name != 'pull_request' || vars.BUILD_CLIENT_TOOLBOX != 'false'
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: ${{ github.ref_type == 'tag' && '0' || '1' }}

      - id: pre-build
        uses: ./.github/actions/pre-build
        with:
          component: client-toolbox

      - id: build-installer
        uses: ./.github/actions/build-installer
        with:
          is_default_branch: ${{ steps.pre-build.outputs.is_default_branch == 'true' }}

      - name: Build image (client-toolbox)
        id: build-client-toolbox
        uses: ./.github/actions/build-image
        with:
          image_name: client-toolbox
          image_version: ${{ steps.pre-build.outputs.image_tag || inputs.platform_version }}
          image_title: 1C Client toolbox for distrobox/toolbx
          image_desc: distrobox create --image <IMAGE> --name client-toolbox && distrobox enter client-toolbox
          containerfile: client-toolbox/Containerfile
          build_args: |
            ONEC_VERSION=${{ steps.pre-build.outputs.version || inputs.platform_version }}
            NLS_ENABLED=${{ inputs.nls_enabled || vars.NLS_ENABLED || false }}
            INSTALLER_IMAGE=${{ steps.build-installer.outputs.image-with-tag }}
            BASE_IMAGE=quay.io/toolbx/ubuntu-toolbox:26.04
          secrets: |
            onec_username=${{ secrets.ONEC_USERNAME }}
            onec_password=${{ secrets.ONEC_PASSWORD }}
          is_default_branch: ${{ steps.pre-build.outputs.is_default_branch == 'true' }}
          publish: ${{ github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
          registry_url: ${{ vars.CONTAINER_REGISTRY_URL }}
          registry_username: ${{ vars.CONTAINER_REGISTRY_USERNAME }}
          registry_password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
