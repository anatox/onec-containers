name: PR build check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

env:
  REGISTRY_PREFIX: "ghcr.io/${{ github.repository_owner }}"
  GIT_OWNER: "${{ github.repository_owner }}"
  GIT_URL: "https://github.com/${{ github.repository }}"

jobs:
  plan:
    runs-on: ubuntu-26.04
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          named-caches-hash: ${{ hashFiles('versions/*.py', 'build_support/*.py') }}

      - name: Select targets
        id: select
        uses: ./.github/actions/select-targets
        with:
          source: 'pr'

  build:
    needs: plan
    if: needs.plan.outputs.matrix != '' && toJson(fromJson(needs.plan.outputs.matrix).include[0].target) != '"noop"'
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Enable containerd image store
        shell: bash
        run: |
          set -eux
          if ! docker info -f '{{.OSType}}' 2>/dev/null | grep -q .; then
            sudo systemctl start docker || true
          fi
          sudo tee /etc/docker/daemon.json <<'JSON'
          {
            "features": { "containerd-snapshotter": true }
          }
          JSON
          sudo systemctl restart docker
          until docker info -f '{{.OSType}}' 2>/dev/null | grep -q .; do sleep 1; done

      - name: Initialize Pants
        uses: pantsbuild/actions/init-pants@v8
        with:
          named-caches-hash: ${{ hashFiles('versions/*.py', 'build_support/*.py') }}

      - name: Write secret files
        shell: bash
        run: |
          umask 177
          cat > secrets.env <<'ENV'
          ONEC_USERNAME=${{ secrets.ONEC_USERNAME }}
          ONEC_PASSWORD=${{ secrets.ONEC_PASSWORD }}
          DEV1C_EXECUTOR_API_KEY=${{ secrets.DEV1C_EXECUTOR_API_KEY }}
          ENV

      - name: Export build environment
        shell: bash
        run: |
          echo "NLS_ENABLED=${{ vars.NLS_ENABLED || 'false' }}" >> "$GITHUB_ENV"

      - name: Package image
        run: pants package '${{ matrix.target }}'
