name: Lint

on:
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7

      - name: Dockerfiles
        uses: reviewdog/action-hadolint@v1
        with:
          reporter: github-pr-check
          fail_level: error

      - name: GitHub Actions workflows
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check
          fail_level: error

      - name: Compose files
        uses: docker-compose-linter/dclint-github-action/reviewdog-action@v1.6.0
        with:
          reporter: github-pr-check
          fail_level: error
          dclint_flags: '-r .'

      - name: Shell scripts
        uses: reviewdog/action-shellcheck@v1
        with:
          reporter: github-pr-check
          fail_level: error
          check_all_files_with_shebangs: 'true'

      - name: Python types (mypy)
        uses: tsuyoshicho/action-mypy@v4
        with:
          reporter: github-pr-check
          fail_level: error
          target: 'bake/ tests/ bake.py bake-select.py'

      - name: Python formatting (black)
        uses: reviewdog/action-black@v3
        with:
          reporter: github-pr-check

      - name: bake HCL syntax
        run: ./bake.py --print --progress=quiet > /dev/null
