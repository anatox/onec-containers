name: Build base-k8s-agent
description: Builds base Jenkins k8s agent image chain (onec-installer → client → s6 → vnc → oscript → jdk → test-utils → agent)

inputs:
  ONEC_USERNAME:
    required: true
    description: 1C portal username
  ONEC_PASSWORD:
    required: true
    description: 1C portal password
  ONEC_VERSION:
    default: '8.5.1.1343'
    description: 1C:Enterprise platform version
  ONESCRIPT_VERSION:
    default: '2.0.2'
    description: OneScript version
  OPENJDK_VERSION:
    default: '17'
    description: OpenJDK version
  TEST_UTILS_EXTRA_PACKAGES:
    default: ''
    description: Extra test-utils packages
  is_default_branch:
    default: 'false'
  publish:
    default: 'false'
  registry_url:
    default: ''
    description: Registry URL (defaults to ghcr.io)
  registry_username:
    default: ''
    description: Registry auth username (defaults to github.actor)
  registry_password:
    default: ''
    description: Registry auth password (defaults to github.token)

outputs:
  image:
    value: ${{ steps.build-agent.outputs.image }}
    description: Leaf image name (base-jenkins-agent)

runs:
  using: composite
  steps:
    - uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62

    - id: build-installer
      uses: ./.github/actions/build-installer
      with:
        is_default_branch: ${{ inputs.is_default_branch }}

    - name: Build image (onec-client)
      id: build-client
      uses: ./.github/actions/build-image
      with:
        image_name: onec-client
        image_version: ${{ inputs.ONEC_VERSION }}
        image_title: 1C:Enterprise client
        containerfile: client/Containerfile
        build_args: |
          ONEC_VERSION=${{ inputs.ONEC_VERSION }}
          INSTALLER_IMAGE=${{ steps.build-installer.outputs.image-with-tag }}
        secrets: |
          onec_username=${{ inputs.ONEC_USERNAME }}
          onec_password=${{ inputs.ONEC_PASSWORD }}
        is_default_branch: ${{ inputs.is_default_branch }}

    - name: Build image (onec-client-s6)
      id: build-client-s6
      uses: ./.github/actions/build-image
      with:
        image_name: onec-client-s6
        image_version: ${{ inputs.ONEC_VERSION }}
        image_title: 1C:Enterprise client + s6-overlay
        containerfile: s6-overlay/Containerfile
        build_args: |
          BASE_IMAGE=${{ steps.build-client.outputs.image-with-tag }}
        is_default_branch: ${{ inputs.is_default_branch }}

    - name: Build image (onec-client-vnc)
      id: build-client-vnc
      uses: ./.github/actions/build-image
      with:
        image_name: onec-client-vnc
        image_version: ${{ inputs.ONEC_VERSION }}
        image_title: 1C:Enterprise client + VNC
        containerfile: client-vnc/Containerfile
        build_args: |
          BASE_IMAGE=${{ steps.build-client-s6.outputs.image-with-tag }}
        is_default_branch: ${{ inputs.is_default_branch }}

    - name: Build image (onec-client-vnc-oscript)
      id: build-client-vnc-oscript
      uses: ./.github/actions/build-image
      with:
        image_name: onec-client-vnc-oscript
        image_version: ${{ inputs.ONEC_VERSION }}
        image_title: 1C:Enterprise client + VNC + OneScript
        containerfile: oscript/Containerfile
        build_args: |
          BASE_IMAGE=${{ steps.build-client-vnc.outputs.image-with-tag }}
        is_default_branch: ${{ inputs.is_default_branch }}

    - name: Build image (onec-client-vnc-oscript-jdk)
      id: build-client-vnc-oscript-jdk
      uses: ./.github/actions/build-image
      with:
        image_name: onec-client-vnc-oscript-jdk
        image_version: ${{ inputs.ONEC_VERSION }}
        image_title: 1C:Enterprise client + VNC + OneScript + JDK
        containerfile: jdk/Containerfile
        build_args: |
          BASE_IMAGE=${{ steps.build-client-vnc-oscript.outputs.image-with-tag }}
          OPENJDK_VERSION=${{ inputs.OPENJDK_VERSION }}
        is_default_branch: ${{ inputs.is_default_branch }}

    - name: Build image (onec-client-vnc-oscript-jdk-testutils)
      id: build-client-vnc-oscript-jdk-testutils
      uses: ./.github/actions/build-image
      with:
        image_name: onec-client-vnc-oscript-jdk-testutils
        image_version: ${{ inputs.ONEC_VERSION }}
        image_title: 1C:Enterprise client + VNC + OneScript + JDK + test-utils
        containerfile: test-utils/Containerfile
        build_args: |
          BASE_IMAGE=${{ steps.build-client-vnc-oscript-jdk.outputs.image-with-tag }}
          TEST_UTILS_EXTRA_PACKAGES=${{ inputs.TEST_UTILS_EXTRA_PACKAGES }}
        is_default_branch: ${{ inputs.is_default_branch }}

    - name: Build image (base-jenkins-agent)
      id: build-agent
      uses: ./.github/actions/build-image
      with:
        image_name: base-jenkins-agent
        image_version: ${{ inputs.ONEC_VERSION }}
        image_title: Base Jenkins k8s agent
        containerfile: k8s-jenkins-agent/Containerfile
        build_args: |
          BASE_IMAGE=${{ steps.build-client-vnc-oscript-jdk-testutils.outputs.image-with-tag }}
        is_default_branch: ${{ inputs.is_default_branch }}
        publish: ${{ inputs.publish }}
        registry_url: ${{ inputs.registry_url }}
        registry_username: ${{ inputs.registry_username }}
        registry_password: ${{ inputs.registry_password }}
