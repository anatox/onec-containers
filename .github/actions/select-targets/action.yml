name: Select Pants targets
description: Select changed docker_image targets via Pants and output a build matrix

inputs:
  source:
    required: true
    description: Trigger source — "pr", "push", or "workflow_dispatch"
  targets:
    default: '::'
    description: Pants target pattern for workflow_dispatch (e.g. "::" or "server:")
  filter_toolchain:
    default: 'false'
    description: Exclude oscript and installer targets from the publish matrix (set to 'true' for release)

outputs:
  matrix:
    description: Build matrix JSON (include array)
    value: ${{ steps.select.outputs.matrix }}

runs:
  using: composite
  steps:
    - name: Select targets
      id: select
      shell: bash
      env:
        PANTS_CONFIG_FILES: pants.ci.toml
      run: |
        set -euo pipefail

        case "${{ inputs.source }}" in
          workflow_dispatch)
            patrons="${{ inputs.targets }}"
            ;;
          pr)
            if git diff --name-only "origin/main...HEAD" | grep -qE '^(versions/|build_support/|pants.*\.toml)'; then
              patrons="::"
            else
              patrons="--changed-since=origin/main --changed-dependents=transitive"
            fi
            ;;
          push)
            if git diff --name-only "${{ github.event.before }}..${{ github.event.after }}" | grep -qE '^(versions/|build_support/|pants.*\.toml)'; then
              patrons="::"
            else
              patrons="--changed-since=${{ github.event.before }} --changed-dependents=transitive"
            fi
            ;;
        esac

        targets_json="$(pants list --filter-target-type=docker_image ${patrons} 2>/dev/null | jq -R -s -c 'split("\n") | map(select(length > 0))')"

        echo "=== Selected targets ==="
        echo "$targets_json" | jq -r '.[]'

        filter_expr='.'
        if [[ "${{ inputs.filter_toolchain }}" == "true" ]]; then
          filter_expr='select(test("^(oscript:|installer:)") | not)'
        fi

        matrix_json="$(echo "$targets_json" | jq -c '[.[] | '"${filter_expr}"' | {target: ., name: ((split(":")[0] | split("/")[-1]) + ((split(":")[1] | capture("-(?<ver>[0-9][0-9.]*)$")? | " " + .ver) // ""))}]')"

        mapfile -t target_arr < <(echo "$matrix_json" | jq -r '.[].target')
        repo_map="{}"
        for t in "${target_arr[@]}"; do
          repo="$(pants peek "$t" 2>/dev/null | jq -r '.[0].repository // empty')"
          [ -n "$repo" ] && repo_map="$(echo "$repo_map" | jq --arg t "$t" --arg r "$repo" '.[$t] = $r')"
        done
        matrix_json="$(echo "$matrix_json" | jq --argjson repos "$repo_map" '[.[] | . + {repo: ($repos[.target] // (split(":")[0] | split("/")[-1]))}]')"

        echo "=== Build matrix ==="
        echo "$matrix_json" | jq -r '.[] | "\(.target) -> \(.name)"'

        if [[ "$(echo "$matrix_json" | jq 'length')" == "0" ]]; then
          echo "No publishable targets selected."
          matrix_json="[]"
        fi

        echo "matrix={\"include\":$(echo "$matrix_json" | jq -c 'if . == [] then [{target:"noop",name:"noop"}] else . end')}" >> "$GITHUB_OUTPUT"
