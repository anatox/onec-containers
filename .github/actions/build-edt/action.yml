name: Build EDT
description: Builds EDT image (onec-installer → edt)

inputs:
  EDT_VERSION:
    required: true
    description: EDT version (e.g. 2026.1.2)
  ONEC_USERNAME:
    required: true
    description: 1C portal username
  ONEC_PASSWORD:
    required: true
    description: 1C portal password
  is_default_branch:
    default: 'false'

outputs:
  image:
    value: ${{ steps.build-edt.outputs.image }}
    description: EDT image name (e.g. 'edt')
  image-with-tag:
    value: ${{ steps.build-edt.outputs.image-with-tag }}
    description: EDT image name with tag (e.g. 'edt:2026.1.2')

runs:
  using: composite
  steps:
    - id: build-installer
      uses: ./.github/actions/build-installer
      with:
        is_default_branch: ${{ inputs.is_default_branch }}

    - name: Write secrets.env
      shell: bash
      run: |
        umask 177
        cat > "${{ runner.temp }}/secrets.env" <<'ENV'
        ONEC_USERNAME=${{ inputs.ONEC_USERNAME }}
        ONEC_PASSWORD=${{ inputs.ONEC_PASSWORD }}
        ENV

    - name: Build image (edt)
      id: build-edt
      uses: ./.github/actions/build-image
      with:
        image_name: edt
        image_version: ${{ inputs.EDT_VERSION }}
        image_title: 1C:Enterprise Development Tools
        containerfile: edt/Containerfile
        build_args: |
          EDT_VERSION=${{ inputs.EDT_VERSION }}
          INSTALLER_IMAGE=${{ steps.build-installer.outputs.image-with-tag }}
        file_secrets: |
          secrets_env=${{ runner.temp }}/secrets.env
        is_default_branch: ${{ inputs.is_default_branch }}

    - name: Cleanup secrets.env
      if: always()
      shell: bash
      run: rm -f "${{ runner.temp }}/secrets.env"
