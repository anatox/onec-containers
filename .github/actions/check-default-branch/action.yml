name: Check default branch
description: Determine if the current ref is at the tip of the default branch

outputs:
  is_default_branch:
    value: ${{ steps.check.outputs.is_default_branch }}

runs:
  using: composite
  steps:
    - name: Ensure default branch ref
      shell: bash
      run: git fetch origin "${{ github.event.repository.default_branch }}" --depth=1

    - name: Check if at tip of default branch
      id: check
      shell: bash
      run: |
        if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "${{ github.event.repository.default_branch }}" ]; then
          echo "is_default_branch=true" >> "$GITHUB_OUTPUT"
        elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse "origin/${{ github.event.repository.default_branch }}")" ]; then
            echo "is_default_branch=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_default_branch=false" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "is_default_branch=false" >> "$GITHUB_OUTPUT"
        fi
