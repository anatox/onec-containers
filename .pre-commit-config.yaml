fail_fast: true

default_language_version:
  python: python3.14

repos:
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      - id: black
        name: black (auto-format)
        stages: [pre-commit]
      - id: black
        name: black (check only)
        stages: [pre-push]
        args: [--check, --diff]

  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        name: isort (auto-format)
        stages: [pre-commit]
      - id: isort
        name: isort (check only)
        stages: [pre-push]
        args: [--check, --diff]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        stages: [pre-commit, pre-push]
      - id: check-json
        stages: [pre-commit, pre-push]
      - id: check-merge-conflict
        stages: [pre-commit, pre-push]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: bake-check
        name: bake --print check (hcl syntax)
        language: system
        entry: bash -c './bake.py --print --progress=quiet > /dev/null'
        files: ^(.*\.hcl$|bake.*\.py$)
        stages: [pre-commit, pre-push]
        pass_filenames: false
        types: [text]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
        stages: [pre-commit, pre-push]

  - repo: https://github.com/shenxianpeng/hadolint-pre-commit
    rev: v2.14.0.1
    hooks:
      - id: hadolint
        name: hadolint
        stages: [pre-commit, pre-push]
        args: [--failure-threshold, error]

  - repo: https://github.com/docker-compose-linter/pre-commit-dclint
    rev: v3.1.0
    hooks:
      - id: dclint
        name: dclint (auto-fix, errors only)
        stages: [pre-commit]
        args: [--fix, --quiet]
      - id: dclint
        name: dclint (full analysis)
        stages: [pre-push]

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        name: shellcheck
        stages: [pre-commit, pre-push]
        args: [--severity=error]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.3.0
    hooks:
      - id: mypy
        name: mypy (basic check — files)
        alias: mypy-files-pre-commit
        stages: [pre-commit]
        pass_filenames: false
        files: ^(bake\.py|bake-select\.py)
        args: [--ignore-missing-imports, --explicit-package-bases, bake.py, bake-select.py]
      - id: mypy
        name: mypy (basic check — bake pkg)
        alias: mypy-bake-pre-commit
        stages: [pre-commit]
        pass_filenames: false
        files: ^bake/
        args: [--ignore-missing-imports, --explicit-package-bases, -p, bake]
      - id: mypy
        name: mypy (strict check — files)
        alias: mypy-files-pre-push
        stages: [pre-push]
        pass_filenames: false
        files: ^(bake\.py|bake-select\.py)
        args: [--strict, --explicit-package-bases, bake.py, bake-select.py]
      - id: mypy
        name: mypy (strict check — bake pkg)
        alias: mypy-bake-pre-push
        stages: [pre-push]
        pass_filenames: false
        files: ^bake/
        args: [--strict, --explicit-package-bases, -p, bake]
